<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindLibrary</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- GATE -->
<div id="welcomeGate" class="gate">
    <div class="gate-card">
        <h1>🌿 MindLibrary</h1>
        <p>Ruang tenang untuk pikiranmu</p>

        <input id="userNameInput" placeholder="Namamu..." />
        <button onclick="masukPerpustakaan()">Mulai</button>
    </div>
</div>

<!-- MAIN -->
<div id="mainContent" class="container hidden">

    <header class="header">
        <h1>MindLibrary</h1>
        <p>Halo, <span id="userDisplayName"></span> ✨</p>
    </header>

    <section id="bookShelf" class="grid"></section>

</div>

<!-- READER -->
<div id="readingRoom" class="reader hidden">
    <div class="paper">
        <button class="close" onclick="tutupBuku()">✕</button>

        <h2 id="readTitle"></h2>
        <p id="readAuthor"></p>

        <div id="readBody"></div>

        <textarea id="userFeedback" placeholder="Tulis kesan..."></textarea>
        <button onclick="kirimMasukan()">Kirim</button>
    </div>
</div>

<!-- WATERMARK -->
<div class="watermark">
    <p>Dibuat oleh firman</p>
    Wanayasa ✦ 2026
</div>

<script src="script.js"></script>
</body>
</html>
